services:
  bot:
    build: .
    container_name: shohibul-quran-bot
    restart: unless-stopped
    stop_grace_period: 10s
    environment:
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep ./main || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      # Persist SQLite DB and WhatsApp session data
      - ./data:/app/data
      # Mount .env file for configuration (optional if environment vars are used)
      - ./.env:/app/.env

